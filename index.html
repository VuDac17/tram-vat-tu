<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERIOR STATION - TRẠM THỢ XƯỞNG</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0F172A; margin: 0; padding: 15px; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #E2E8F0; }
        .card { background: #1E293B; border-radius: 14px; padding: 24px; width: 100%; max-width: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { text-align: center; color: #10B981; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
        label { font-size: 11px; font-weight: bold; color: #94A3B8; display: block; margin-bottom: 6px; letter-spacing: 0.5px; }
        select, input { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #334155; background: #0F172A; color: white; margin-bottom: 20px; outline: none; }
        select:focus, input:focus { border-color: #10B981; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 14px; color: white; border: none; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-nhap { background: #10B981; }
        .btn-nhap:hover { background: #059669; }
        .btn-xuat { background: #EF4444; }
        .btn-xuat:hover { background: #DC2626; }
    </style>
</head>
<body>

<div class="card">
    <h2>✨ INTERIOR STATION</h2>
    
    <label>🏢 VẬT TƯ THUỘC DỰ ÁN NÀO?</label>
    <select id="cb_du_an">
        <option value="KHO_TONG">Kho tổng xưởng (Không tính vào dự án)</option>
    </select>

    <label>📦 TÊN VẬT TƯ BIẾN ĐỘNG</label>
    <input type="text" id="ten_vt" placeholder="Ví dụ: Ván MDF 17mm, Bản lề hơi...">

    <label>🔢 SỐ LƯỢNG BIẾN ĐỘNG THỰC TẾ</label>
    <input type="text" id="so_luong" placeholder="Nhập số lượng (Ví dụ: 10 hoặc 10 tấm)...">

    <div class="btn-group">
        <button class="btn-nhap" onclick="xuLyGiaoDich('NHẬP KHO')">📥 NHẬP KHO</button>
        <button class="btn-xuat" onclick="xuLyGiaoDich('XUẤT KHO')">📤 XUẤT KHO</button>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://vudac17.github.io/tram-vat-tu/";

    // Tự động tải danh sách dự án từ máy chủ về menu lựa chọn trên điện thoại thợ
    window.onload = function() {
        fetch(`${FIREBASE_URL}du_an.json`)
        .then(res => res.json())
        .then(data => {
            const cb = document.getElementById('cb_du_an');
            if(data) {
                for (let key in data) {
                    let opt = document.createElement('option');
                    opt.value = key;
                    opt.innerText = `${key} - ${data[key].ten_du_an}`;
                    cb.appendChild(opt);
                }
            }
        });
    };

    function xuLyGiaoDich(loai) {
        const ten = document.getElementById('ten_vt').value.trim();
        const slRaw = document.getElementById('so_luong').value.trim();
        const duAn = document.getElementById('cb_du_an').value;

        // Bộ lọc số nhanh tại client loại bỏ chữ lặt vặt
        const sl = parseInt(slRaw.replace(/[^0-9]/g, ''));

        if (!ten || isNaN(sl) || sl <= 0) {
            Swal.fire('Lỗi nhập liệu', 'Vui lòng điền đúng tên vật tư và số lượng số!', 'warning');
            return;
        }

        const ma_vt_hoa = ten.replace(/ /g, "_").toUpperCase();
        const ngay_ht = new Date().toLocaleDateString('vi-VN');
        const gio_ht = new Date().toLocaleTimeString('vi-VN');

        fetch(`${FIREBASE_URL}kho_vat_tu/${ma_vt_hoa}.json`)
        .then(res => res.json())
        .then(data => {
            let sl_cu = (data && data.so_luong) ? parseInt(data.so_luong) : 0;
            let don_gia = (data && data.don_gia) ? parseFloat(data.don_gia) : 0;
            let sl_moi = (loai === "NHẬP KHO") ? (sl_cu + sl) : (sl_cu - sl);

            if (sl_moi < 0) {
                Swal.fire('Thất bại', 'Số lượng tồn kho không đủ để xuất!', 'error');
                return;
            }

            // Cập nhật kho chung
            fetch(`${FIREBASE_URL}kho_vat_tu/${ma_vt_hoa}.json`, {
                method: 'PUT',
                body: JSON.stringify({ ten_vt: ten, don_gia: don_gia, so_luong: sl_moi })
            });

            // Ghi nhật ký lịch sử dữ liệu đồng bộ
            const id_log = "LS_" + Date.now();
            fetch(`${FIREBASE_URL}nhat_ky_nhap_xuat/${id_log}.json`, {
                method: 'PUT',
                body: JSON.stringify({
                    ten_vt: ten, loai: loai, so_luong: sl, don_gia: don_gia,
                    ma_du_an: duAn, ngay: ngay_ht, gio: gio_ht
                })
            }).then(() => {
                Swal.fire('Thành công', `Đã ghi nhận ${loai} thành công!`, 'success');
                document.getElementById('ten_vt').value = '';
                document.getElementById('so_luong').value = '';
            });
        });
    }
</script>
</body>
</html>
